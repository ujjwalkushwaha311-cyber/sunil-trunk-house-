{% extends "admin/change_list.html" %}
{% load i18n %}

{% block content %}
  <div class="module aligned">
    <div class="dashboard-summary" style="display:flex; gap:20px; margin-bottom:20px;">
      <div style="padding:18px; background:#fff; border:1px solid #dcdcdc; border-radius:10px; flex:1;">
        <h2 style="margin:0 0 8px;">Total Revenue</h2>
        <p style="font-size:1.8rem; margin:0;">₹{{ total_revenue|default:0|floatformat:2 }}</p>
      </div>
      <div style="padding:18px; background:#fff; border:1px solid #dcdcdc; border-radius:10px; flex:1;">
        <h2 style="margin:0 0 8px;">This Month</h2>
        <p style="font-size:1.8rem; margin:0;">₹{{ monthly_revenue|default:0|floatformat:2 }}</p>
      </div>
    </div>
  </div>
  {{ block.super }}
{% endblock %}
